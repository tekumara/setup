"$schema" = "https://jj-vcs.github.io/jj/latest/config-schema.json"

[user]
name = "Oliver Mannion"
email = "125105+tekumara@users.noreply.github.com"

[aliases]
# see https://github.com/jj-vcs/jj/discussions/2425#discussioncomment-11425112
tug = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@-"]

[git]
# Prevent pushing work in progress or anything explicitly labeled "private"
private-commits = "description(glob:'wip:*') | description(glob:'private:*')"

[ui]
default-command = "log"
diff-formatter = ["difft", "--color=always", "$left", "$right"]

[template-aliases]
# format remote bookmarks for use in gh pr view --web
gh_remote_bookmark = "remote_bookmarks.filter(|b| b.remote() != 'git').map(|b| if(b.remote() == 'origin', b.name(), b.remote() ++ ':' ++ b.name()))"

[merge-tools.cursor]
program = "cursor"
merge-args = ["--wait", "--merge", "$left", "$right", "$base", "$output"]
merge-tool-edits-conflict-markers = true
conflict-marker-style = "git"
diff-args = ["--diff", "$left", "$right", "--wait"]
diff-invocation-mode = "file-by-file"
edit-args = []
